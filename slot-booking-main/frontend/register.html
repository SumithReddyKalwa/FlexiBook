<!-- register.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FlexiBook</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create an account</h1>
            <p>Start booking slots effortlessly.</p>
        </div>

        <form id="registerForm" class="auth-form form">
            <div class="input-group">
                <label for="registerName">Full Name</label>
                <input id="registerName" type="text" required placeholder="Jane Doe">
            </div>

            <div class="input-group">
                <label for="registerEmail">Email</label>
                <input id="registerEmail" type="email" required placeholder="you@company.com">
            </div>

            <div class="input-group">
                <label for="registerPassword">Password</label>
                <input id="registerPassword" type="password" minlength="6" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-block">Sign Up</button>
            <p id="registerMessage" class="message"
                style="color: var(--danger); font-size: 13px; text-align: center; margin: 0;"></p>
        </form>

        <div style="text-align: center; margin-top: 24px; font-size: 14px; color: #a1a1aa;">
            Already have an account? <a href="/login.html"
                style="color: #ffffff; text-decoration: none; font-weight: 500;">Sign in</a>
        </div>
    </div>
    <script src="/js/script.js"></script>
</body>

</html>
