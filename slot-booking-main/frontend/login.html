<!-- login.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FlexiBook</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" width="24" height="24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>
            <h1>Welcome back</h1>
            <p>Enter your details to sign in to your dashboard.</p>
        </div>

        <form id="loginForm" class="auth-form form">
            <div class="input-group">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" required placeholder="name@company.com">
            </div>

            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input id="loginPassword" type="password" required placeholder="••••••••">
            </div>

            <div class="auth-options">
                <label>
                    <input type="checkbox">
                    <span>Remember me</span>
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-block">Sign In</button>
            <p id="loginMessage" class="message"
                style="color: var(--danger); font-size: 13px; text-align: center; margin: 0;"></p>
        </form>

        <div style="text-align: center; margin-top: 24px; font-size: 14px; color: #a1a1aa;">
            Don't have an account? <a href="/register.html"
                style="color: #ffffff; text-decoration: none; font-weight: 500;">Sign up</a>
        </div>
    </div>
    <script src="/js/script.js"></script>
</body>

</html>
